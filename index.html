<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A3横　賞状作成アプリ </title>
    <!-- PWA（アプリ化）用設定 -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <!-- 明朝体フォントの読み込み -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="57x57" HREF="/apple-icon-57x57.png">
<link rel="apple-touch-icon" sizes="60x60" HREF="/apple-icon-60x60.png">
<link rel="apple-touch-icon" sizes="72x72" HREF="/apple-icon-72x72.png">
<link rel="apple-touch-icon" sizes="76x76" HREF="/apple-icon-76x76.png">
<link rel="apple-touch-icon" sizes="114x114" HREF="/apple-icon-114x114.png">
<link rel="apple-touch-icon" sizes="120x120" HREF="/apple-icon-120x120.png">
<link rel="apple-touch-icon" sizes="144x144" HREF="/apple-icon-144x144.png">
<link rel="apple-touch-icon" sizes="152x152" HREF="/apple-icon-152x152.png">
<link rel="apple-touch-icon" sizes="180x180" HREF="/apple-icon-180x180.png">
<link rel="icon" type="image/png" sizes="192x192"  HREF="/android-icon-192x192.png">
<link rel="icon" type="image/png" sizes="32x32" HREF="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="96x96" HREF="/favicon-96x96.png">
<link rel="icon" type="image/png" sizes="16x16" HREF="/favicon-16x16.png">
<link rel="manifest" HREF="/manifest.json">
<meta name="msapplication-TileColor" content="#ffffff">
<meta name="msapplication-TileImage" content="/ms-icon-144x144.png">
<meta name="theme-color" content="#ffffff">
    <style>
        :root {
            --paper-width: 420mm; /* A3 横 */
            --paper-height: 297mm;
            --gold-color: #d4af37;
        }

        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* ===== 左側の操作パネル ===== */
        .controls {
            width: 300px;
            background: #333;
            color: white;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .controls h2 { margin-top: 0; font-size: 1.2rem; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; }
        .input-group input, .input-group textarea {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border-radius: 4px;
            border: none;
        }
        .input-group textarea { height: 100px; resize: vertical; }

        .input-notice {
            margin-top: 6px;
            padding: 7px 10px;
            background-color: #fff3cd;
            border-left: 4px solid #f0ad4e;
            border-radius: 3px;
            color: #7a5000;
            font-size: 0.78rem;
            line-height: 1.6;
        }
        .input-notice-example {
            font-weight: bold;
            letter-spacing: 0.05em;
        }

        button.print-btn {
            background-color: var(--gold-color);
            color: #000;
            border: none;
            padding: 10px 20px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        button.print-btn:hover { opacity: 0.9; }

        button.pdf-btn {
            background-color: #28a745; /* PDFボタンは緑色で区別 */
            color: white;
            border: none;
            padding: 10px 20px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button.pdf-btn:hover { opacity: 0.9; }
        button.pdf-btn:disabled { background-color: #ccc; cursor: not-allowed; }

        /* モード選択スイッチのスタイル */
        .mode-select {
            display: flex;
            margin-bottom: 20px;
            border: 1px solid #555;
            border-radius: 5px;
            overflow: hidden;
        }
        .mode-select label {
            flex: 1;
            text-align: center;
            cursor: pointer;
            margin: 0;
            background: #444;
            color: #ccc;
        }
        .mode-select input {
            display: none;
        }
        .mode-select span {
            display: block;
            padding: 12px;
            font-weight: bold;
        }
        .mode-select input:checked + span {
            background: var(--gold-color);
            color: #000;
        }

        /* ===== 右側のプレビューエリア ===== */
        .preview-area {
            flex-grow: 1;
            display: flex;
            padding: 40px;
            overflow: auto;
        }

        /* スケーリング用の外側コンテナ：実際に表示される大きさを持つ */
        .preview-outer {
            margin: auto;
            overflow: hidden;
            flex-shrink: 0;
        }

        /* 賞状ラッパー：transform-originをtop leftにしてscaleする */
        .preview-wrapper {
            transform-origin: top left;
        }

        /* ===== 賞状の用紙設定 ===== */
        .certificate {
            width: var(--paper-width);
            height: var(--paper-height);
            background: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            position: relative;
            /* 縦書き設定の肝 */
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-family: 'Shippori Mincho', serif;
            box-sizing: border-box;
            padding: 40mm 50mm; /* 余白 */
            
            /* レイアウト調整 */
            display: flex;
            flex-direction: column; /* 縦書きなのでcolumnが横方向の配置になります */
            align-items: center; /* 垂直方向（横書きでいう水平）の中央揃え */
        }

        /* 飾り枠（CSSで簡易的な金の枠を表現） */
        .border-frame {
            position: absolute;
            top: 0; bottom: 0; left: 0; right: 0;
            background-image: url('resize_crop_A3-h-n_27dpi_A4.jpeg');
            background-size: 100% 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* 各テキスト要素のスタイル */
        .cert-title {
            font-size: 4rem;
            font-weight: 700;
            margin-left: 20mm; /* 縦書きなのでマージン方向注意 */
            letter-spacing: 1rem;
            position: relative;
            z-index: 1;
        }

        .cert-rank {
            font-size: 3.5rem;
            font-weight: bold;
            margin-left: 10mm;
            align-self: flex-start; /* 上寄せ */
            padding-top: 20mm;
            position: relative;
            z-index: 1;
            letter-spacing: 0.5rem;
            writing-mode: vertical-rl;   /* horizontal-tb のラッパー内で縦書きを明示 */
            text-orientation: upright;
        }

        /* 部門のスタイル */
        .cert-department {
            display: none; /* デフォルト非表示 */
            font-size: 2rem;
            font-weight: bold;
            margin-left: 10mm;
            align-self: flex-start; /* 上寄せ */
            padding-top: 20mm;
            position: relative;
            z-index: 1;
            letter-spacing: 0.5rem;
        }

        /* 順位と名前を囲むラッパー：常時Flexboxにして縦並び（物理的な上下）を制御 */
        /* writing-mode: horizontal-tb を明示して flex 挙動を安定させる。
           チーム名・受賞者名が増えた際に vertical-rl × row の挙動がブラウザ間でずれるのを防ぐ。
           子要素（cert-rank, cert-team, recipients-container）に個別に writing-mode を再指定する。 */
        .rank-recipient-wrapper {
            display: flex;
            writing-mode: horizontal-tb; /* flex の主軸方向をブラウザ間で確実に固定する */
            flex-direction: column; /* horizontal-tb では column = 物理的に上から下 */
            align-items: center; /* 物理的な水平方向の中央揃え */
            gap: 10mm; /* 順位と名前の間隔 */
            margin-left: 20mm; /* デフォルトでタイトルと左端を揃える */
            z-index: 1;
        }

        /* ラッパー内の順位・名前コンテナの配置リセット（個別の位置指定を打ち消し） */
        .rank-recipient-wrapper .cert-rank,
        .rank-recipient-wrapper .recipients-container {
            align-self: auto;
            margin: 0;
            padding: 0;
        }

        /* 部門がある場合のレイアウト変更 */
        .certificate.has-department .cert-department {
            display: block;
        }

        .certificate.has-department .rank-recipient-wrapper {
            justify-content: space-between; /* 部門ありの時は上下いっぱいに広げる */
            align-self: stretch;
            margin-left: 10mm; /* 部門がある場合はインデントを部門に合わせる */
            margin-right: 5mm;
            gap: 0;
        }

        /* 部門ありの時の順位フォント調整 */
        .certificate.has-department .cert-rank {
            font-size: 2.5rem;
            padding-top: 20mm; /* 上に余白を追加して下にずらす */
        }

        /* 部門あり時は本文をさらに右へ寄せる */
        .certificate.has-department .cert-body {
            transform: translateX(20mm);
        }

        /* 個人戦・部門なしの場合、順位と名前の間隔を広げる */
        .certificate:not(.has-department):not(.team-mode) .rank-recipient-wrapper {
            gap: 30mm; /* 間隔を広げる（元は10mm） */
            transform: translateY(10mm); /* gap増加分を補正して順位の絶対位置を維持し、名前だけ下げる */
        }

        /* 個人戦・部門なしの場合、本文を少し右へ寄せる（大会名が長い場合はそちらのスタイル優先） */
        .certificate:not(.has-department):not(.team-mode):not(.long-tournament) .cert-body {
            transform: translateX(10mm);
        }

        /* 名前表示エリア（コンテナ） */
        .recipients-container {
            display: flex;
            writing-mode: vertical-rl;   /* horizontal-tb のラッパー内で縦書きを明示 */
            text-orientation: upright;
            flex-direction: column; /* 縦書きモードではこれが「横並び」になります */
            gap: 20px;
            align-items: center; /* 名前ごとのセンタリング */
        }

        /* 団体戦の場合、受賞者名の開始位置を少し下げる */
        .certificate.team-mode .recipients-container {
            margin-top: 15mm;
        }

        /* 団体戦の場合、順位とチーム名も少し下げる */
        .certificate.team-mode .cert-rank,
        .certificate.team-mode .cert-team {
            margin-top: 10mm;
        }

        .cert-recipient {
            font-size: 4.5rem;
            font-weight: bold;
            letter-spacing: 0.5rem;
            white-space: nowrap;
            writing-mode: vertical-rl;
            text-orientation: upright;
        }
        .cert-recipient span { margin-top: 20px;}

        /* 大会名が長いときに、名前・順位・部門を右へずらして本文との重なりを防ぐ */
        .certificate.long-tournament .cert-rank,
        .certificate.long-tournament .recipients-container,
        .certificate.long-tournament .cert-department,
        .certificate.long-tournament .cert-team { /* チーム名も一緒にずらす */
            transform: translateX(15mm);
        }

        /* 本文は名前列より少し多めに右へ寄せて左への食み出しを抑える */
        .certificate.long-tournament .cert-body {
            transform: translateX(25mm);
        }

        /* 本文が長い場合はフッターも本文に合わせて右へずらす */
        .certificate.long-tournament .cert-footer {
            transform: translateX(25mm);
        }

        /* 部門あり・本文長い場合は、部門の押し出し分を考慮してフッターをさらに右へ配置 */
        .certificate.long-tournament.has-department .cert-footer {
            transform: translateX(35mm);
        }

        /* 上記条件の時、日付だけは少し左（本文寄り）に戻す */
        .certificate.long-tournament.has-department .cert-date {
            transform: translateX(-10mm);
        }

        /* 複数名（2名以上）連名の時のスタイル調整 */
        .certificate.multi-recipients .cert-recipient {
            font-size: 3.0rem; /* 文字サイズを小さくして収まりを良くする */
        }

        .certificate.multi-recipients .rank-recipient-wrapper {
            transform: translateX(10mm);
        }

        /* 複数名（2名以上）連名の時、フッターを少し右へ寄せる */
        .certificate.multi-recipients .cert-footer {
            transform: translateX(15mm);
        }

        /* 本文はさらに右へ寄せる（25mm） */
        .certificate.multi-recipients .cert-body {
            transform: translateX(25mm);
        }

        /* 複数名連名 かつ 大会名が長い場合の調整 */
        .certificate.long-tournament.multi-recipients .cert-footer {
            transform: translateX(30mm);
        }
        .certificate.long-tournament.multi-recipients .cert-body {
            transform: translateX(40mm);
        }

        /* 3名連名の時だけフッター（主催・贈呈者）を右へ寄せる */
        .certificate.three-recipients .cert-footer {
            transform: translateX(35mm);
        }

        /* 3名連名の時だけ本文も右へ寄せる */
        .certificate.three-recipients .cert-body {
            transform: translateX(35mm);
        }

        /* 3名連名 かつ 大会名が長い場合の追加調整 */
        .certificate.long-tournament.three-recipients .cert-body,
        .certificate.long-tournament.three-recipients .cert-footer {
            transform: translateX(50mm); /* さらに右へずらす */
        }

        /* cert-date は cert-footer のフロー内なので footer の translateX で一緒に動く。個別指定不要 */

        /* チーム名のスタイル */
        .cert-team {
            font-size: 3.0rem;
            font-weight: bold;
            letter-spacing: 0.3rem;
            white-space: nowrap;
            writing-mode: vertical-rl;   /* horizontal-tb のラッパー内で縦書きを明示 */
            text-orientation: upright;
        }

        .cert-body {
            font-size: 3.5rem;
            font-weight: bold;
            line-height: 2.0;
            white-space: pre-wrap; /* 改行を反映 */
            text-align: justify;
            margin: 30mm 15mm 0 auto; /* right=15mmに固定して右寄り */
            position: relative;
            z-index: 1;
            letter-spacing: 0.3rem;
            max-height: 200mm;
            align-self: flex-start;
        }

        .cert-footer {
            display: flex;
            flex-direction: column; /* 縦書き内の横並び */
            align-items: flex-end; /* 下寄せ（縦書きの左側） */
            gap: 15mm;
            position: relative;
            z-index: 1;
            transform: translateX(5mm); /* デフォルトの位置（本文短い時） */
            flex-grow: 1; /* 残りのスペースを埋めることで高さを安定させ、中央揃えによるズレを防ぐ */
            align-self: stretch; /* 上下いっぱいに広げて、文字数による位置ズレを防ぐ */
        }

        /* 日付は cert-footer のフロー内に置き align-self で上寄せ。
           cert-footer ごと translateX すれば日付も一緒に動く。
           贈呈者の文字数変化は別列なので日付の縦位置に影響しない。 */
        .cert-date {
            font-size: 2.5rem;
            letter-spacing: 0.3rem;
            white-space: nowrap;
            align-self: flex-start;   /* 縦書き内で物理上寄せ（= 縦方向上寄せ） */
            margin-top: 20mm;         /* 位置を少し下げる */
            position: relative;
            z-index: 1;
        }

        .cert-organization {
            font-size: 3.0rem;
            font-weight: bold;
            letter-spacing: 0.3rem;
            white-space: nowrap;
            align-self: center;       /* 中央に配置 */
        }

        .cert-sender {
            font-size: 3rem;
            letter-spacing: 0.3rem;
            white-space: nowrap;
            align-self: center;       /* 中央揃えを基準にする */
            margin-top: 60mm;         /* マージンで中心位置を下にずらす（真ん中より下へ） */
        }

        /* 個人戦・部門あり、または団体戦の場合、贈呈者だけを少し右へ寄せる */
        .certificate.has-department:not(.team-mode) .cert-sender,
        .certificate.team-mode .cert-sender {
            transform: translateX(8mm);
        }

        /* 団体戦で2名以上の場合、主催団体と贈呈者をさらに少し右へずらす */
        .certificate.multi-recipients .cert-organization {
            transform: translateX(5mm);
        }

        .certificate.multi-recipients .cert-sender {
            transform: translateX(13mm); /* チーム戦の8mm + 5mm */
        }

        /* ===== 印刷時のスタイル設定 ===== */
        @media print {
            @page {
                size: A3 landscape;
                margin: 0;
            }
            /* 背景画像や色を強制的に出力する設定 */
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            html, body {
                width: var(--paper-width);
                height: var(--paper-height);
                margin: 0;
                padding: 0;
                overflow: hidden;
                background: white;
                display: block !important;
            }
            .controls { display: none !important; }
            .panel-toggle-btn { display: none !important; }
            .preview-area {
                display: block;
                padding: 0;
                margin: 0;
                width: var(--paper-width);
                height: var(--paper-height);
                overflow: hidden;
            }
            /* JSでセットされたインラインサイズをリセットしてA3原寸に戻す */
            .preview-outer {
                width: var(--paper-width) !important;
                height: var(--paper-height) !important;
                margin: 0 !important;
                overflow: hidden;
            }
            .preview-wrapper {
                transform: none !important;
                width: var(--paper-width) !important;
                height: var(--paper-height) !important;
                margin: 0 !important;
                overflow: hidden;
            }
            .certificate {
                box-shadow: none;
                width: var(--paper-width);
                height: var(--paper-height);
                margin: 0;
                overflow: hidden;
                page-break-after: avoid;
                break-after: avoid;
            }
            /* 通常の印刷時は枠（画像）を消す */
            .border-frame {
                display: none !important;
            }
        }

        /* ===== モバイル対応 ===== */

        /* パネル開閉ボタン（デスクトップでは非表示） */
        .panel-toggle-btn {
            display: none;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
                height: 100dvh;
                overflow: hidden;
            }

            /* パネル開閉ボタン */
            .panel-toggle-btn {
                display: flex;
                align-items: center;
                gap: 8px;
                position: fixed;
                top: 12px;
                right: 12px;
                z-index: 100;
                background: var(--gold-color);
                color: #000;
                border: none;
                border-radius: 6px;
                padding: 8px 14px;
                font-size: 0.85rem;
                font-weight: bold;
                cursor: pointer;
                box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            }

            .panel-toggle-btn .btn-icon {
                font-size: 1.1rem;
                line-height: 1;
            }

            /* コントロールパネル：モバイルでは上にスライドするオーバーレイ */
            .controls {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                width: 100%;
                z-index: 90;
                transform: translateY(-100%);
                transition: transform 0.3s ease;
                padding: 16px 16px 100px 16px;
                border-radius: 0;
            }

            .controls.panel-open {
                transform: translateY(0);
            }

            .controls h2 {
                font-size: 1.1rem;
                margin-top: 8px;
                margin-bottom: 12px;
                padding-top: 40px; /* ボタンとの重なり防止 */
            }

            .input-group {
                margin-bottom: 12px;
            }

            .input-group input,
            .input-group textarea {
                font-size: 16px; /* iOSのズーム防止 */
                padding: 10px;
            }

            .mode-select span {
                padding: 10px;
                font-size: 0.9rem;
            }

            .input-notice {
            margin-top: 6px;
            padding: 7px 10px;
            background-color: #fff3cd;
            border-left: 4px solid #f0ad4e;
            border-radius: 3px;
            color: #7a5000;
            font-size: 0.78rem;
            line-height: 1.6;
        }
        .input-notice-example {
            font-weight: bold;
            letter-spacing: 0.05em;
        }

        button.print-btn {
                padding: 14px;
                font-size: 1rem;
                margin-top: 10px;
            }

            /* プレビューエリアは画面全体を使う */
            .preview-area {
                flex-grow: 1;
                padding: 12px;
                overflow: hidden;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .preview-outer {
                margin: 0;
            }
        }

        /* 非常に狭い画面向け */
        @media (max-width: 480px) {
            .preview-area {
                padding: 8px;
            }
        }
    </style>
</head>
<body>

    <!-- モバイル用パネル開閉ボタン -->
    <button class="panel-toggle-btn" id="panelToggleBtn" onclick="togglePanel()">
        <span class="btn-icon">✏️</span>
        <span id="panelBtnLabel">入力パネルを開く</span>
    </button>

    <!-- 操作パネル -->
    <div class="controls" id="controlsPanel">
        <h2>賞状作成</h2>
        
        <!-- モード選択 (UI変更・移動) -->
        <div class="mode-select">
            <label>
                <input type="radio" name="mode" value="single" checked onchange="toggleMode()">
                <span>個人戦</span>
            </label>
            <label>
                <input type="radio" name="mode" value="team" onchange="toggleMode()">
                <span>団体戦</span>
            </label>
        </div>

        <div class="input-group">
            <label>部門</label>
            <input type="text" id="inputDepartment" placeholder="例：男子の部">
        </div>
        <div class="input-group">
            <label>順位</label>
            <input type="text" id="inputRank" value="優勝">
        </div>
        <div class="input-group">
            <div class="input-group team-only" style="display:none;">
                <label>チーム名</label>
                <input type="text" id="inputTeamName" placeholder="例：チームA">
            </div>
            <label>受賞者名1</label>
            <input type="text" id="inputRecipient1" value="山田 太郎">
        </div>
        <div class="input-group team-only" style="display:none;">
            <label>受賞者名2</label>
            <input type="text" id="inputRecipient2" placeholder="二人目の名前">
        </div>
        <div class="input-group team-only" style="display:none;">
            <label>受賞者名3</label>
            <input type="text" id="inputRecipient3" placeholder="三人目の名前">
        </div>

        <div class="input-group">
            <label>本文：主催者</label>
            <input type="text" id="inputOrganizerName" placeholder="例：日本将棋連盟">
        </div>
        <div class="input-group">
            <label>本文：大会名</label>
            <input type="text" id="inputTournamentName" placeholder="例：竜王戦">
        </div>
        <div class="input-group">
            <label>日付</label>
            <input type="text" id="inputDate" value="令和六年五月一日">
        </div>
        <div class="input-group">
            <label>主催団体</label>
            <input type="text" id="inputOrganization" value="株式会社 サンプル">
            <div class="input-notice">
                ⚠️ 団体名の区切りには必ず空欄を入れてください<br>
                <span class="input-notice-example">例：株式会社 サンプル</span>
            </div>
        </div>
        <div class="input-group">
            <label>贈呈者</label>
            <input type="text" id="inputSender" value="代表取締役 佐藤 次郎">
            <div class="input-notice">
                ⚠️ 役職・姓・名の間には必ず空欄を入れてください<br>
                <span class="input-notice-example">例：代表取締役 佐藤 次郎</span>
            </div>
        </div>
        <button class="print-btn" onclick="window.print()">印刷</button>
        <button class="pdf-btn" onclick="savePDF()">PDF保存 (高画質)</button>
    </div>

    <!-- プレビュー（賞状本体） -->
    <div class="preview-area" id="previewArea">
        <!-- 実際に表示される大きさを持つ外側コンテナ -->
        <div class="preview-outer" id="previewOuter">
            <!-- 縮小表示用のラッパー -->
            <div class="preview-wrapper" id="previewWrapper">
            <div class="certificate">
                <div class="border-frame"></div>
                
                <div class="cert-title">表彰状</div>
                
                <div class="cert-department" id="dispDepartment"></div>
                
                <div class="rank-recipient-wrapper">
                    <div class="cert-rank" id="dispRank">優勝</div>
                    
                    <div class="cert-team" id="dispTeamName" style="display:none;"></div>

                    <div class="recipients-container">
                        <div class="cert-recipient"><span id="dispRecipient1">山田 太郎</span></div>
                        <div class="cert-recipient" id="divRecipient2" style="display:none;"><span id="dispRecipient2"></span></div>
                        <div class="cert-recipient" id="divRecipient3" style="display:none;"><span id="dispRecipient3"></span></div>
                    </div>
                </div>
                
                <div class="cert-body" id="dispBody">右は○○主催
○○大会において
頭書の成績を収めたので
ここにこれを賞します</div>
                
                <div class="cert-footer">
                    <div class="cert-date" id="dispDate">令和六年五月一日</div>
                    <div class="cert-organization" id="dispOrganization">株式会社 サンプル</div>
                    <div class="cert-sender" id="dispSender">代表取締役 佐藤 次郎</div>
                </div>
            </div>
        </div><!-- /.preview-wrapper -->
        </div><!-- /.preview-outer -->
    </div>

    <script>
        // ===== パネル開閉 =====
        let panelOpen = false;

        function togglePanel() {
            panelOpen = !panelOpen;
            const panel = document.getElementById('controlsPanel');
            const label = document.getElementById('panelBtnLabel');
            if (panelOpen) {
                panel.classList.add('panel-open');
                label.textContent = '閉じる';
            } else {
                panel.classList.remove('panel-open');
                label.textContent = '入力パネルを開く';
                // パネルを閉じた瞬間（キーボード収納後）に正しいサイズで再計算
                setTimeout(scaleCertificate, 300);
            }
        }

        // パネルの外をタップしたら閉じる
        document.getElementById('previewArea').addEventListener('click', function() {
            if (panelOpen && window.innerWidth <= 768) {
                panelOpen = false;
                document.getElementById('controlsPanel').classList.remove('panel-open');
                document.getElementById('panelBtnLabel').textContent = '入力パネルを開く';
                // パネルを閉じた瞬間（キーボード収納後）に正しいサイズで再計算
                setTimeout(scaleCertificate, 300);
            }
        });

        // ===== 賞状スケーリング =====
        // A3横: 420mm x 297mm
        const CERT_WIDTH_PX  = Math.round(420 * 3.7795); // ≈ 1587px
        const CERT_HEIGHT_PX = Math.round(297 * 3.7795); // ≈ 1122px

        function scaleCertificate() {
            // モバイルでパネルが開いている間はキーボードの影響を無視する
            if (window.innerWidth <= 768 && panelOpen) return;

            const outer   = document.getElementById('previewOuter');
            const wrapper = document.getElementById('previewWrapper');
            const area    = document.getElementById('previewArea');

            // 利用可能なエリアサイズ（paddingを除く）
            const style   = getComputedStyle(area);
            const padH    = parseFloat(style.paddingLeft) + parseFloat(style.paddingRight);
            const padV    = parseFloat(style.paddingTop)  + parseFloat(style.paddingBottom);
            const areaW   = area.clientWidth  - padH;
            const areaH   = area.clientHeight - padV;

            // 収まるスケールを計算（最大1倍＝拡大しない）
            const scale = Math.min(areaW / CERT_WIDTH_PX, areaH / CERT_HEIGHT_PX, 1);

            // wrapperをscale変換（top leftを基点）
            wrapper.style.width  = CERT_WIDTH_PX  + 'px';
            wrapper.style.height = CERT_HEIGHT_PX + 'px';
            wrapper.style.transform = `scale(${scale})`;
            wrapper.style.transformOrigin = 'top left';

            // outerのサイズを「スケール後の実寸」に設定し、
            // layoutがA3原寸を占有しないようにする
            outer.style.width  = Math.round(CERT_WIDTH_PX  * scale) + 'px';
            outer.style.height = Math.round(CERT_HEIGHT_PX * scale) + 'px';
        }

        window.addEventListener('resize', scaleCertificate);
        window.addEventListener('DOMContentLoaded', scaleCertificate);
        document.fonts.ready.then(scaleCertificate);

        // ===== 入力値と表示を同期させるスクリプト =====
        const inputs = {
            department: document.getElementById('inputDepartment'),
            rank: document.getElementById('inputRank'),
            teamName: document.getElementById('inputTeamName'),
            recipient1: document.getElementById('inputRecipient1'),
            recipient2: document.getElementById('inputRecipient2'),
            recipient3: document.getElementById('inputRecipient3'),
            organizerName: document.getElementById('inputOrganizerName'),
            tournamentName: document.getElementById('inputTournamentName'),
            date: document.getElementById('inputDate'),
            organization: document.getElementById('inputOrganization'),
            sender: document.getElementById('inputSender')
        };

        const displays = {
            department: document.getElementById('dispDepartment'),
            rank: document.getElementById('dispRank'),
            teamName: document.getElementById('dispTeamName'),
            recipient1: document.getElementById('dispRecipient1'),
            recipient2: document.getElementById('dispRecipient2'),
            recipient3: document.getElementById('dispRecipient3'),
            body: document.getElementById('dispBody'),
            date: document.getElementById('dispDate'),
            organization: document.getElementById('dispOrganization'),
            sender: document.getElementById('dispSender')
        };

        const certContainer = document.querySelector('.certificate');

        // 本文を更新する関数（主催者名・大会名のどちらかが長ければlong-tournamentを付与）
        function updateBody() {
            const organizer = inputs.organizerName.value || '○○';
            const tournament = inputs.tournamentName.value || '○○大会';
            const isLong = tournament.length > 10 || organizer.length > 8;

            let text;
            if (tournament.length > 10) {
                // 大会名が長い場合：「において」を使用
                text = `右は${organizer}主催\n${tournament}において頭書の成績を収めたのでここにこれを賞します`;
            } else {
                // 短い場合：「で」を使用
                text = `右は${organizer}主催\n${tournament}で頭書の成績を収めたのでここにこれを賞します`;
            }

            // 主催者名・大会名のどちらかが長ければフッターをずらすクラスを付与
            if (isLong) {
                certContainer.classList.add('long-tournament');
            } else {
                certContainer.classList.remove('long-tournament');
            }

            displays.body.innerText = text;
        }

        // 団体戦モード切替
        function toggleMode() {
            const isTeam = document.querySelector('input[name="mode"][value="team"]').checked;
            const teamInputs = document.querySelectorAll('.team-only');
            
            // 入力欄の表示切替
            teamInputs.forEach(el => el.style.display = isTeam ? 'block' : 'none');

            // 団体戦の場合は部門入力を隠し、プレビューからも消す
            if (isTeam) {
                inputs.department.parentElement.style.display = 'none';
                certContainer.classList.remove('has-department');
                certContainer.classList.add('team-mode');
            } else {
                inputs.department.parentElement.style.display = 'block';
                if (inputs.department.value && inputs.department.value.trim() !== '') {
                    certContainer.classList.add('has-department');
                }
                certContainer.classList.remove('team-mode');
            }

            // 団体戦じゃないときは、プレビューの2,3人目を隠す
            if (!isTeam) {
                document.getElementById('divRecipient2').style.display = 'none';
                document.getElementById('divRecipient3').style.display = 'none';
                displays.teamName.style.display = 'none';
            } else {
                // 団体戦に切り替えたときは、すでに入力があれば表示を復帰させる
                if (inputs.recipient2.value) document.getElementById('divRecipient2').style.display = 'block';
                if (inputs.recipient3.value) document.getElementById('divRecipient3').style.display = 'block';
                if (inputs.teamName.value) displays.teamName.style.display = 'block';
            }
            checkMultiRecipients();
        }

        // イベントリスナーを一括登録
        Object.keys(inputs).forEach(key => {
            inputs[key].addEventListener('input', (e) => {
                if (key === 'organizerName' || key === 'tournamentName') {
                    updateBody();
                } else {
                    displays[key].innerText = e.target.value;
                }

                // 名前2, 3の入力があれば表示エリアを出す
                if (key === 'recipient2') {
                    document.getElementById('divRecipient2').style.display = e.target.value ? 'block' : 'none';
                    checkMultiRecipients();
                }
                if (key === 'recipient3') {
                    document.getElementById('divRecipient3').style.display = e.target.value ? 'block' : 'none';
                    checkMultiRecipients();
                }

                if (key === 'teamName') {
                    displays.teamName.style.display = e.target.value ? 'block' : 'none';
                }
                
                // 部門の入力有無チェック
                if (key === 'department') {
                    if (e.target.value && e.target.value.trim() !== '') {
                        certContainer.classList.add('has-department');
                    } else {
                        certContainer.classList.remove('has-department');
                    }
                }
            });
        });

        // 複数名（2名以上）入力されているかチェックしてスタイルを適用する関数
        function checkMultiRecipients() {
            const isTeam = document.querySelector('input[name="mode"][value="team"]').checked;
            // 団体戦かつ、2人目または3人目が入力されている場合
            const hasMulti = inputs.recipient2.value.trim() !== '' || inputs.recipient3.value.trim() !== '';
            if (isTeam && hasMulti) {
                certContainer.classList.add('multi-recipients');
            } else {
                certContainer.classList.remove('multi-recipients');
            }

            // 3人目が入力されている場合（本文位置調整用）
            if (isTeam && inputs.recipient3.value.trim() !== '') {
                certContainer.classList.add('three-recipients');
            } else {
                certContainer.classList.remove('three-recipients');
            }
        }

        // PDF保存処理（ブラウザ標準機能への誘導）
        function savePDF() {
            if (!confirm("【PDF保存の手順】\n\n1. この後開く印刷画面で、送信先を「PDFに保存」に変更してください。\n2. 「保存」ボタンを押すとPDFファイルがダウンロードされます。\n\n※この方法なら画質が劣化せず、文字も綺麗に保存されます。\n\n進みますか？")) return;

            // 印刷ダイアログを開く
            window.print();
        }
    </script>
</body>
